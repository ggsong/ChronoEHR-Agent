name: CI

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run no-data smoke checks
        run: |
          python src/chrono_ehr/run_study.py --list
          python src/chrono_ehr/run_study.py --synthetic-demo
          python src/chrono_ehr/run_study.py --validate-synthetic-demo
          python scripts/release_audit.py --project-root .
