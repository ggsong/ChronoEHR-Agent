# ChronoEHR-Agent planned study config
# Demo: MIMIC-IV heart failure 30-day hospital readmission prediction.

dataset:
  name: "mimic_iv_3_1_heart_failure_readmission"
  type: "mimic_iv_csv_gz"
  root_path: "${MIMIC_IV_ROOT}"
  version: "MIMIC-IV 3.1"
  tables:
    patients: "hosp/patients.csv.gz"
    admissions: "hosp/admissions.csv.gz"
    diagnoses_icd: "hosp/diagnoses_icd.csv.gz"
    d_icd_diagnoses: "hosp/d_icd_diagnoses.csv.gz"
  id_columns:
    patient_id: "subject_id"
    admission_id: "hadm_id"

cohort_definition:
  study_name: "Heart failure 30-day readmission prediction in MIMIC-IV"
  population: "adult hospital admissions with current or prior heart failure diagnosis codes"
  heart_failure_code_rules:
    icd9_prefixes:
      - "428"
    icd10_prefixes:
      - "I50"
  inclusion_criteria:
    - "anchor_age >= 18"
    - "current or prior hospital admission has ICD-9 428* or ICD-10 I50* heart failure diagnosis"
    - "valid admission time and discharge time"
  exclusion_criteria:
    - "in-hospital death during index admission"
    - "missing patient_id or admission_id"
    - "post-discharge death within 30 days without readmission, flagged for exclusion in the demo script"
  notes:
    - "Admission-time prediction should not use current-admission discharge-coded heart failure status unless known before admission."

outcome:
  name: "readmission_30d"
  type: "binary"
  prediction_time: "discharge_time"
  definition: "next hospital admission for the same subject within 30 days after index discharge"
  followup_window_days: 30
  label_positive: "readmitted within 30 days"
  label_negative: "not readmitted within 30 days"
  note: "First version counts all-cause readmission; sensitivity analysis includes emergency/urgent and non-elective proxy definitions."

prediction_times:
  primary:
    name: "discharge_time_prediction"
    description: "predict 30-day readmission at discharge using variables available by discharge"
    time_column: "dischtime"
  planned:
    - name: "admission_time_prediction"
      description: "uses variables known at or before admission; heart failure status should be prior-known"
      time_column: "admittime"

feature_sets:
  admission_safe_v0:
    enabled: true
    description: "simple variables available at admission or before admission"
    variables:
      - "anchor_age"
      - "gender"
      - "admission_type"
      - "admission_location"
      - "insurance"
      - "language"
      - "marital_status"
      - "race"
      - "prior_admissions_count"
      - "days_since_prior_discharge"
      - "prior_hf_diagnosis"
  discharge_safe_v0:
    enabled: true
    description: "variables available by discharge"
    variables:
      - "anchor_age"
      - "gender"
      - "admission_type"
      - "admission_location"
      - "insurance"
      - "length_of_stay_days"
      - "prior_admissions_count"
      - "days_since_prior_discharge"
      - "current_hf_admission"
      - "known_hf_before_or_current_admission"
  forbidden_or_high_risk:
    variables:
      - "readmission_30d"
      - "next_admittime"
      - "next_hadm_id"
      - "days_to_next_admission"
      - "deathtime"
      - "dod"
      - "hospital_expire_flag"
      - "discharge_location"
      - "postdischarge_death_within_30d"
      - "future_labs_after_discharge"
      - "followup_events_within_30d"

models:
  logistic_regression:
    enabled: true
    note: "dependency-light baseline using numpy/scipy"
  random_forest:
    enabled: false
    note: "enable after scikit-learn is installed"
  xgboost:
    enabled: false
    note: "optional after baseline pipeline is stable"

metrics:
  required:
    - "event_rate"
    - "AUROC"
    - "AUPRC"
    - "sensitivity"
    - "specificity"
    - "PPV"
    - "NPV"
    - "Brier_score"
  note: "Do not report AUROC alone because readmission is class-imbalanced."

split_strategy:
  method: "patient_level_hash_split"
  group_column: "subject_id"
  train_size: 0.70
  validation_size: 0.15
  test_size: 0.15
  random_seed: 20260619
  leakage_checks:
    check_patient_overlap: true
    check_outcome_proxy_features: true
    check_future_followup_features: true

outputs:
  cohort_csv: "data/processed/mimic_heart_failure_readmission_cohort.csv"
  tables:
    cohort_summary: "outputs/tables/mimic_heart_failure_cohort_summary.csv"
    split_summary: "outputs/tables/mimic_heart_failure_split_summary.csv"
    table1_basic: "outputs/tables/mimic_heart_failure_table1_basic.csv"
    feature_missingness: "outputs/tables/mimic_heart_failure_feature_missingness.csv"
    feature_time_audit: "outputs/tables/mimic_heart_failure_feature_time_audit.csv"
    lab_feature_availability: "outputs/tables/mimic_heart_failure_lab_feature_availability.csv"
    lab_extraction_stats: "outputs/tables/mimic_heart_failure_lab_extraction_stats.csv"
    prediction_time_model_performance: "outputs/tables/mimic_heart_failure_prediction_time_model_performance.csv"
    logistic_coefficients: "outputs/tables/mimic_heart_failure_logistic_coefficients.csv"
    test_predictions: "outputs/tables/mimic_heart_failure_test_predictions.csv"
    leakage_sensitivity: "outputs/tables/mimic_heart_failure_leakage_sensitivity.csv"
    outcome_sensitivity: "outputs/tables/mimic_heart_failure_outcome_sensitivity.csv"
    readmission_next_type: "outputs/tables/mimic_heart_failure_30d_readmission_next_type.csv"
  reports:
    run_summary: "outputs/reports/mimic_heart_failure_run_summary.md"
    leakage_audit: "outputs/reports/mimic_heart_failure_leakage_audit_report.md"
    feature_time_audit: "outputs/reports/mimic_heart_failure_feature_time_audit_report.md"
    lab_feature_report: "outputs/reports/mimic_heart_failure_lab_feature_report.md"
    prediction_time_model: "outputs/reports/mimic_heart_failure_prediction_time_model_report.md"
    prediction_time_figure: "outputs/reports/mimic_heart_failure_prediction_time_figure_report.md"
    leakage_sensitivity: "outputs/reports/mimic_heart_failure_leakage_sensitivity_report.md"
    outcome_sensitivity: "outputs/reports/mimic_heart_failure_outcome_sensitivity_report.md"
  figures:
    prediction_time_auroc: "outputs/figures/mimic_heart_failure_prediction_time_auroc.png"
    prediction_time_auprc: "outputs/figures/mimic_heart_failure_prediction_time_auprc.png"
